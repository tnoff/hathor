name: Dependabot Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # boto3 and friends: all update types
  auto-approve-specific:
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
    with:
      accept_packages: 'yt-dlp'
      allowed_update_types: 'major,minor,patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}

  auto-approve-google:
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
    with:
      accept_packages: 'google-api-python-client '
      allowed_update_types: 'minor,patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}

  # test requirements: any update type, filtered by path
  auto-approve-test-reqs:
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
    with:
      file_pattern: 'tests/**'
      allowed_update_types: 'major,minor,patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}

  # everything else: patch only
  auto-approve-patch:
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
    with:
      allowed_update_types: 'patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}