[tox]
min_version = 4.0
env_list =
    py311
    py312
    py313
    py314

[testenv]
deps =
    .[test]
commands =
    py314: pylint --ignore=plugins hathor/
    py314: pylint --rcfile .pylintrc.test tests/
    py314: bandit -r hathor/ --exclude hathor/plugins
    pytest --cov=hathor --cov-report=xml --cov-fail-under=98 tests/

[pytest]
filterwarnings = error

[coverage:run]
omit =
    # skip plugins
    hathor/plugins/*
